<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://firebase.googleapis.com https://*.firebaseio.com 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeVault - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="logo2.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0c0f 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: rgba(30, 30, 46, 0.95);
      border-radius: 24px;
      padding: 48px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .login-box img {
      width: 80px;
      margin-bottom: 24px;
    }

    .login-box h2 {
      color: white;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .login-box p {
      color: #aaa;
      margin-bottom: 32px;
      font-size: 14px;
    }

.input-wrapper {
  position: relative;
  width: 100%;
  margin: 8px 0;
}

.login-box input {
  width: 100%;
  padding: 14px 45px 14px 16px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  background: #2d2d3a;
  color: white;
  font-size: 16px;
  transition: all 0.2s;
}

    .login-box input:focus {
      outline: none;
      background: #3d3d4a;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      margin: 0;
      width: auto;
      height: auto;
    }

    .password-toggle:hover {
      color: #2ecc71;
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-box button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-box button:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #2ecc71;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #27ae60;
    }

    .btn-secondary {
      background: #3498db;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #2980b9;
    }

    .google-btn {
      background: white;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .google-btn:hover:not(:disabled) {
      background: #f5f5f5;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 13px;
      margin: 10px 0;
      display: none;
      background: rgba(231, 76, 60, 0.1);
      padding: 12px;
      border-radius: 10px;
    }

    .success-msg {
      color: #2ecc71;
      font-size: 13px;
      margin: 10px 0;
      display: none;
      background: rgba(46, 204, 113, 0.1);
      padding: 12px;
      border-radius: 10px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #333;
    }

    .divider span {
      padding: 0 15px;
      color: #666;
      font-size: 12px;
    }

    .switch-form {
      margin-top: 20px;
      font-size: 13px;
      color: #aaa;
    }

    .switch-form a {
      color: #2ecc71;
      text-decoration: none;
    }

    .switch-form a:hover {
      text-decoration: underline;
    }

    .terms-text {
      font-size: 11px;
      color: #666;
      margin-top: 20px;
    }

    .forgot-password {
      display: block;
      text-align: right;
      font-size: 12px;
      margin-top: -4px;
      margin-bottom: 8px;
    }

    .forgot-password a {
      color: #888;
      text-decoration: none;
    }

    .forgot-password a:hover {
      color: #2ecc71;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="logo2.png" alt="TradeVault Logo">
    <h2>Welcome to TradeVault</h2>
    <p>Start tracking your trades like a pro</p>
    
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    
    <!-- Google Sign In/Up -->
    <button class="google-btn" id="googleLoginBtn">
      <i class="fa-brands fa-google"></i> Continue with Google
    </button>
    
    <div class="divider">
      <span>or</span>
    </div>
    
    <!-- Sign Up Form -->
    <div id="signupForm">
      <input type="email" id="signupEmail" placeholder="Email">
 <div class="input-wrapper">
  <input type="password" id="signupPassword" placeholder="Create password">
  <button type="button" class="password-toggle" data-target="signupPassword">
    <i class="fa-regular fa-eye-slash"></i>
  </button>
</div>
      <button id="signupBtn" class="btn-primary">Sign up</button>
      <p class="terms-text">
        By creating an account you agree to our Terms of Service and Privacy Policy
      </p>
      <p class="switch-form">
        Already have an account? <a href="#" id="showSignInLink">Sign in</a>
      </p>
    </div>
    
    <!-- Sign In Form (hidden by default) -->
    <div id="signinForm" style="display: none;">
      <input type="email" id="signinEmail" placeholder="Email">
      <div class="input-wrapper">
        <input type="password" id="signinPassword" placeholder="Password">
        <button type="button" class="password-toggle" data-target="signinPassword">
          <i class="fa-regular fa-eye-slash"></i>
        </button>
      </div>
      <div class="forgot-password">
        <a href="#" id="forgotPasswordLink">Forgot password?</a>
      </div>
      <button id="signinBtn" class="btn-secondary">Sign in</button>
      <p class="switch-form">
        Don't have an account? <a href="#" id="showSignUpLink">Create one</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBFI951HIupsbAD7yb8LmTo_BvYl8bJscY",
      authDomain: "tradevault-app-a5623.firebaseapp.com",
      projectId: "tradevault-app-a5623",
      storageBucket: "tradevault-app-a5623.firebasestorage.app",
      messagingSenderId: "659352755976",
      appId: "1:659352755976:web:712a80812d6e3f186656bd",
      measurementId: "G-SRXZDDF64M"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    const signupForm = document.getElementById('signupForm');
    const signinForm = document.getElementById('signinForm');

    function showError(message) {
      successDiv.style.display = 'none';
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 8000);
    }

    function showSuccess(message) {
      errorDiv.style.display = 'none';
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      setTimeout(() => { successDiv.style.display = 'none'; }, 5000);
    }

    // Password visibility toggle
    document.querySelectorAll('.password-toggle').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = btn.getAttribute('data-target');
        const input = document.getElementById(targetId);
        if (input.type === 'password') {
          input.type = 'text';
          btn.innerHTML = '<i class="fa-regular fa-eye"></i>';
        } else {
          input.type = 'password';
          btn.innerHTML = '<i class="fa-regular fa-eye-slash"></i>';
        }
      });
    });

    // Toggle forms
    document.getElementById('showSignInLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      signupForm.style.display = 'none';
      signinForm.style.display = 'block';
    });

    document.getElementById('showSignUpLink')?.addEventListener('click', (e) => {
      e.preventDefault();
      signinForm.style.display = 'none';
      signupForm.style.display = 'block';
    });

    // SIGN UP
    const signupBtn = document.getElementById('signupBtn');
    if (signupBtn) {
      signupBtn.addEventListener('click', async () => {
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        if (!email || !password) return showError("Please enter email and password");
        if (password.length < 6) return showError("Password must be at least 6 characters");

        try {
          const userCred = await createUserWithEmailAndPassword(auth, email, password);
          await setDoc(doc(db, "users", userCred.user.uid), {
            email: email,
            isPremium: false,
            createdAt: new Date(),
            provider: "email"
          });
          window.location.href = "index.html";
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') showError("Email already exists. Please sign in.");
          else if (err.code === 'auth/too-many-requests') showError("Too many attempts. Use Google Sign‑in or try later.");
          else if (err.code === 'auth/network-request-failed') showError("Network error. Check your internet connection and refresh.");
          else showError(err.message);
        }
      });
    }

    // SIGN IN
    const signinBtn = document.getElementById('signinBtn');
    if (signinBtn) {
      signinBtn.addEventListener('click', async () => {
        const email = document.getElementById('signinEmail').value.trim();
        const password = document.getElementById('signinPassword').value;
        if (!email || !password) return showError("Please enter email and password");

        signinBtn.disabled = true;
        setTimeout(() => { signinBtn.disabled = false; }, 3000);

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = "index.html";
        } catch (err) {
          if (err.code === 'auth/user-not-found') showError("No account found. Please sign up first.");
          else if (err.code === 'auth/wrong-password') showError("Incorrect password. Use 'Forgot password?' to reset.");
          else if (err.code === 'auth/invalid-credential') showError("Invalid email or password. If you signed up with Google, use the Google button.");
          else if (err.code === 'auth/too-many-requests') showError("Too many failed attempts. Use Google Sign‑in or wait.");
          else if (err.code === 'auth/network-request-failed') showError("Network error. Check your connection and refresh.");
          else showError(err.message);
        }
      });
    }

    // FORGOT PASSWORD
    const forgotLink = document.getElementById('forgotPasswordLink');
    if (forgotLink) {
      forgotLink.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        if (!email) {
          showError("Please enter your email address first.");
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          showSuccess(`Password reset email sent to ${email}. Check your inbox (and spam folder).`);
        } catch (err) {
          if (err.code === 'auth/user-not-found') showError("No account found with this email.");
          else if (err.code === 'auth/too-many-requests') showError("Too many requests. Try again later.");
          else if (err.code === 'auth/network-request-failed') showError("Network error. Please check your connection.");
          else showError(err.message);
        }
      });
    }

    // GOOGLE SIGN IN (always shows account picker)
    const googleBtn = document.getElementById('googleLoginBtn');
    if (googleBtn) {
      googleBtn.addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        try {
          const result = await signInWithPopup(auth, provider);
          await setDoc(doc(db, "users", result.user.uid), {
            email: result.user.email,
            isPremium: false,
            createdAt: new Date(),
            provider: "google"
          }, { merge: true });
          window.location.href = "index.html";
        } catch (err) {
          if (err.code === 'auth/too-many-requests') showError("Too many requests. Try again later.");
          else if (err.code === 'auth/popup-closed-by-user') showError("Sign-in cancelled.");
          else if (err.code === 'auth/network-request-failed') showError("Network error. Check your connection.");
          else showError(err.message);
        }
      });
    }

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
